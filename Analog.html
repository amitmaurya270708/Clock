<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Clock</title>
    <link rel="stylesheet" href="./Analog.css" />
    <link rel="stylesheet" href="./Time.css" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== PRIMARY META TAGS ===== -->
    <title>Analog & Digital Clock | Live Time</title>
    <meta
      name="description"
      content="A beautiful analog clock with hour, minute, and second hands, paired with a digital time display. Real-time, responsive, and clean design."
    />
    <meta
      name="keywords"
      content="analog clock, digital clock, live time, html clock, javascript clock, css clock"
    />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourwebsite.com/clock" />

    <!-- ===== OPEN GRAPH (Facebook, LinkedIn, etc.) ===== -->
    <meta property="og:title" content="Analog & Digital Clock - Live Time" />
    <meta
      property="og:description"
      content="A sleek analog clock with moving hands and a real-time digital display. Perfect for timekeeping or as a screensaver."
    />
    <meta
      property="og:image"
      content="https://yourwebsite.com/clock-preview.jpg"
    />
    <!-- Replace with actual image URL -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://yourwebsite.com/clock" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Clock App" />
    <meta property="og:locale" content="en_US" />

    <!-- ===== TWITTER CARD ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Analog & Digital Clock - Live Time" />
    <meta
      name="twitter:description"
      content="A beautiful real-time analog clock with digital display. Clean, responsive, and interactive."
    />
    <meta
      name="twitter:image"
      content="https://yourwebsite.com/clock-preview.jpg"
    />
    <!-- Replace with actual image URL -->
    <meta name="twitter:site" content="@yourhandle" />
    <meta name="twitter:creator" content="@yourhandle" />

    <!-- ===== THEME & APPLE TOUCH ===== -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="favicon.ico" />
    <!-- Replace with proper 180x180 PNG if available -->

    <!-- ===== FAVICON (already present) ===== -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

    <!-- ===== STYLESHEETS ===== -->
    <link rel="stylesheet" href="./Analog.css" />
    <link rel="stylesheet" href="./Time.css" />

    <!-- ===== ADDITIONAL SCHEMA.ORG (optional) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Analog & Digital Clock",
        "description": "A real-time analog clock with hour, minute, second hands and digital display.",
        "applicationCategory": "Utility",
        "browserRequirements": "Requires JavaScript",
        "operatingSystem": "All",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div class="all">
      <div class="container">
        <div class="clock">
          <div class="hand" style="--clr: red; --h: 74px" id="hour">
            <i></i>
          </div>
          <div class="hand" style="--clr: yellow; --h: 84px" id="min">
            <i></i>
          </div>
          <div class="hand" style="--clr: white; --h: 94px" id="sec">
            <i></i>
          </div>
          <span style="--i: 1"><b>1</b></span>
          <span style="--i: 2"><b>2</b></span>
          <span style="--i: 3"><b>3</b></span>
          <span style="--i: 4"><b>4</b></span>
          <span style="--i: 5"><b>5</b></span>
          <span style="--i: 6"><b>6</b></span>
          <span style="--i: 7"><b>7</b></span>
          <span style="--i: 8"><b>8</b></span>
          <span style="--i: 9"><b>9</b></span>
          <span style="--i: 10"><b>10</b></span>
          <span style="--i: 11"><b>11</b></span>
          <span style="--i: 12"><b>12</b></span>
        </div>
      </div>

      <div class="main">
        <span class="txt" id="txthour">00</span>
        <span class="txt" id="txtmin">00</span>
        <span class="txt" id="txtsec">00</span>

        <span class="txt2" id="cat">AM</span>
      </div>
    </div>
  </body>
  <script src="./Analog.js"></script>
  <script src="./Time.js"></script>

  <noscript style="margin: 40px 0; text-align: center;">

  </noscript>
  </html>
